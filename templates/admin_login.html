<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — SwirlNSprinkle Bakery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --g-ink:#100d07; --g-espresso:#1e140a; --g-terra:#c0622a;
  --g-amber:#e08a3c; --g-parchment:#faf3e8; --g-cream:#f5ead8;
  --g-white:#fefcf9; --g-text-mid:#5c3a1e; --g-text-muted:#9d7a5a;
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'DM Sans','Helvetica Neue',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;}
body{
  font-family:var(--ff-body);
  background:var(--g-espresso);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(192,98,42,.07) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
.login-card{
  background:var(--g-parchment);
  width:100%;max-width:420px;
  padding:0;
  box-shadow:0 32px 80px rgba(0,0,0,.4);
  position:relative;z-index:1;
}
.login-header{
  background:var(--g-ink);
  padding:2.4rem 2.8rem;
  text-align:center;
}
.login-brand{
  font-family:var(--ff-display);
  font-size:2.6rem;
  color:var(--g-cream);
  line-height:1;
  margin-bottom:.3rem;
}
.login-brand em{color:var(--g-terra);font-style:italic;}
.login-label{
  font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(245,234,216,.4);
}
.login-body{padding:2.4rem 2.8rem;}
h2{
  font-family:var(--ff-display);font-size:1.5rem;
  color:var(--g-espresso);margin-bottom:1.4rem;
}
.g-label{
  display:block;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--g-terra);font-weight:600;margin-bottom:.4rem;
}
.g-input{
  width:100%;background:var(--g-white);
  border:1px solid rgba(92,51,22,.18);border-radius:2px;
  color:var(--g-ink);font-family:var(--ff-body);font-size:.95rem;
  padding:.75rem 1rem;
  transition:border-color .28s,box-shadow .28s;
}
.g-input:focus{outline:none;border-color:var(--g-terra);box-shadow:0 0 0 3px rgba(192,98,42,.12);}
.btn-login{
  width:100%;background:var(--g-terra);color:var(--g-white);
  font-family:var(--ff-body);font-size:.72rem;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  padding:1rem 2rem;border:none;border-radius:2px;cursor:pointer;
  transition:background .28s,transform .2s;margin-top:1rem;
}
.btn-login:hover{background:var(--g-amber);transform:translateY(-2px);}
.error-msg{
  background:rgba(192,98,42,.1);border-left:3px solid var(--g-terra);
  padding:.75rem 1rem;font-size:.85rem;color:var(--g-terra);
  margin-bottom:1rem;
}
.back-link{
  text-align:center;margin-top:1.4rem;
  font-size:.78rem;color:var(--g-text-muted);
}
.back-link a{color:var(--g-terra);text-decoration:none;font-weight:600;}
.back-link a:hover{color:var(--g-amber);}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-brand">Swirl &<em>Sprinkle</em></div>
    <div class="login-label">Admin Panel</div>
  </div>
  <div class="login-body">
    <h2>Welcome back</h2>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('admin_login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="g-label" for="password">Admin Password</label>
        <input type="password" id="password" name="password"
               class="g-input" required autofocus placeholder="Enter password">
      </div>
      <button type="submit" class="btn-login">Sign In &nbsp;→</button>
    </form>
    <div class="back-link">
      <a href="{{ url_for('index') }}">← Back to Bakery</a>
    </div>
  </div>
</div>
</body>
</html>
